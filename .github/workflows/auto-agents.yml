name: auto-agents

on:
  push:
    branches:
      - main
    paths:
      - "docs/*"
      - ".github/workflows/auto-agents.yml"

jobs:
  auto-agents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get latest commit SHA
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Generate AGENTS.md
        run: |
          # Generate AGENTS.md with @references to docs/ top-level files
          > AGENTS.md
          for f in docs/*; do
            # Only include files (not directories)
            if [ -f "$f" ]; then
              echo "- @$f" >> AGENTS.md
            fi
          done
      - name: Check for changes
        id: changes
        run: |
          if [ ! -f AGENTS.md ] || ! git diff --quiet AGENTS.md || git ls-files --others --exclude-standard | grep -q "^AGENTS.md$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "noreply@anthropic.com"
          git config --local user.name "Claude"
          git add AGENTS.md
          git commit -m "docs(AGENTS): auto update (${{ steps.commit.outputs.sha }})"
          git push
