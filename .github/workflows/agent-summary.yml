name: agent-summary

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "docs/*"
      - ".github/workflows/agent-summary.yml"

jobs:
  agent-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get latest commit SHA
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Detect agent attribution
        id: agent
        run: |
          commit_message="$(git log -1 --format=%B)"
          if grep -qi 'Co-Authored-By: Codex <noreply@openai.com>' <<< "$commit_message"; then
            echo "name=Codex" >> $GITHUB_OUTPUT
            echo "email=noreply@openai.com" >> $GITHUB_OUTPUT
          elif grep -qi 'Co-Authored-By: Claude <noreply@anthropic.com>' <<< "$commit_message"; then
            echo "name=Claude" >> $GITHUB_OUTPUT
            echo "email=noreply@anthropic.com" >> $GITHUB_OUTPUT
          else
            echo "name=github-actions[bot]" >> $GITHUB_OUTPUT
            echo "email=41898282+github-actions[bot]@users.noreply.github.com" >> $GITHUB_OUTPUT
          fi
      - name: Generate README summary
        run: |
          # Create README.md header
          cat > README.md << 'EOF'
          # AGENTS

          This repository contains AGENTS global prompts and skills for personal use.

          | Skill | Description |
          |-------|-------------|
          EOF

          # Process each skill
          for skill_dir in skills/*/; do
            if [ -d "$skill_dir" ] && [ -f "${skill_dir}SKILL.md" ]; then
              skill_name=$(basename "$skill_dir")

              # Extract description from YAML frontmatter
              description=$(awk '
                BEGIN { in_frontmatter = 0; description = "" }
                /^---$/ {
                  if (in_frontmatter == 0) {
                    in_frontmatter = 1
                  } else {
                    exit
                  }
                  next
                }
                in_frontmatter == 1 && /^description:/ {
                  sub(/^description: */, "")
                  # Remove quotes if present
                  gsub(/^["'"'"']|["'"'"']$/, "")
                  description = $0
                }
                END { print description }
              ' "${skill_dir}SKILL.md")

              # For empty description, leave second column empty
              echo "| [$skill_name](skills/$skill_name/SKILL.md) | $description |" >> README.md
            fi
          done

          # Add footer with commit info
          cat >> README.md << EOF

          ---

          *This document was automatically generated based on commit [\`${{ steps.commit.outputs.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ steps.commit.outputs.sha }}).*
          EOF
      - name: Generate AGENTS.md
        run: |
          # Generate AGENTS.md with @references to docs/ top-level files
          > AGENTS.md
          for f in docs/*; do
            # Only include files (not directories)
            if [ -f "$f" ]; then
              echo "- [@$f]($f)" >> AGENTS.md
            fi
          done

          # Add footer with commit info
          cat >> AGENTS.md << EOF

          ---

          *This document was automatically generated based on commit [\`${{ steps.commit.outputs.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ steps.commit.outputs.sha }}).*
          EOF
      - name: Check for changes
        id: changes
        run: |
          changed=false
          for file in README.md AGENTS.md; do
            if [ ! -f "$file" ] || ! git diff --quiet "$file" || git ls-files --others --exclude-standard | grep -q "^${file}$"; then
              changed=true
              break
            fi
          done
          echo "changed=$changed" >> $GITHUB_OUTPUT
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "${{ steps.agent.outputs.email }}"
          git config --local user.name "${{ steps.agent.outputs.name }}"
          git add README.md AGENTS.md
          git commit -m "docs(agents): auto summary (${{ steps.commit.outputs.sha }})"
          git pull --rebase
          git push
